<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Trending up arrow — bold, centered -->
  <!-- Line path from bottom-left to top-right with two notches -->
  <polyline
    points="96,340  196,228  276,296  416,148"
    fill="none"
    stroke="url(#arrow)"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow head -->
  <polyline
    points="304,128  416,148  396,260"
    fill="none"
    stroke="url(#arrow)"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
